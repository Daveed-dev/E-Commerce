<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- LINK CSS -->
    <link rel="stylesheet" href="./CSS/main.css" />

    <title>E-commerce product page</title>
  </head>
  <body>
    <!-- Collections Men Women About Contact Sneaker Company Fall Limited Edition
    Sneakers  $125.00 50% $250.00 0 Add to cart -->
    <nav class="navbar">
      <div class="nav-left">
        <h2>sneakers</h2>
        <ul class="nav-links">
          <li><a class="nav-link" href="#">Collections</a></li>
          <li><a class="nav-link" href="#">Men</a></li>
          <li><a class="nav-link" href="#">Women</a></li>
          <li><a class="nav-link" href="#">About</a></li>
          <li><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <button class="nav-btn">
          <img src="./images/icon-cart.svg" alt="Icon-Cart" class="cart-img" />
        </button>
        <button class="nav-profile">
          <img
            src="./images/image-avatar.png"
            alt="image avatar"
            class="avatar-img"
          />
        </button>
      </div>
    </nav>
    <div class="product-container">
      <section class="img-section">
        <img
          src="./images/image-product-1.jpg"
          alt="Product Image"
          class="productMain-image"
        />
        <div class="productImages">
          <button class="img-box">
            <img
              src="./images/image-product-1-thumbnail.jpg"
              alt="product-image-1"
              class="product-image"
            />
          </button>
          <button class="img-box">
            <img
              src="./images/image-product-2-thumbnail.jpg"
              alt="product-image-2"
              class="product-image"
            />
          </button>
          <button class="img-box">
            <img
              src="./images/image-product-3-thumbnail.jpg"
              alt="product-image-3"
              class="product-image"
            />
          </button>
          <button class="img-box">
            <img
              src="./images/image-product-4-thumbnail.jpg"
              alt="product-image-4"
              class="product-image"
            />
          </button>
        </div>
      </section>
      <section class="text-section">
        <p>SNEAKER COMPANY</p>
        <h1>Fall Limited Edition Sneakers</h1>
        <p class="product-text">
          These low-profile sneakers are your perfect casual wear companion.
          Featuring a durable rubber outer sole, they’ll withstand everything
          the weather can offer.
        </p>
        <h1>$125.00 <span>50%</span></h1>
        <p class="price">$250.00</p>
        <fig class="product-btns">
          <div class="purchase-no">
            <img src="./images/icon-minus.svg" alt="image-minus" />
            <h4>0</h4>
            <img src="./images/icon-plus.svg" alt="" />
          </div>
          <button class="add-cart-btn">
            <img src="./images/icon-cart.svg" alt="Icon-Cart" />
            Add to cart
          </button>
        </fig>
      </section>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
